<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Typuj mecze{% endblock %}</title>
    
    <!-- HTMX – najważniejszy skrypt -->
    <script src="https://unpkg.com/htmx.org@2.0.4" integrity="sha384-..." crossorigin="anonymous"></script>
    
    <!-- Opcjonalnie Alpine.js – super do małych interakcji (dropdowny, modale, etc.) -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    
    <!-- Tailwind – najłatwiej przez CDN na początek -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    {% block extra_head %}{% endblock %}
</head>
<body class="bg-gray-100 min-h-screen">

    <header class="bg-blue-600 text-white p-4">
        <h1 class="text-2xl font-bold">Typowanie meczów</h1>
        <!-- navbar, linki do grup itp. -->
    </header>

    <main class="container mx-auto p-4">
        {% block content %}{% endblock %}
    </main>

    {% block extra_js %}{% endblock %}
</body>
</html>
